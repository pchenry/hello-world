<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>HELLO WORLD</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020a04;overflow:hidden;height:100vh;width:100vw;cursor:none;font-family:'Courier New',Courier,monospace}

/* Soft scanlines */
body::after{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.08) 3px,rgba(0,0,0,.08) 6px);
  pointer-events:none;z-index:100;
}

canvas{position:fixed;inset:0;z-index:0}
#ui{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}

/* Calm matrix title */
.glitch{
  position:relative;font-size:clamp(3rem,10vw,8rem);font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;
  color:#c8ffc8;
  text-shadow:0 0 12px rgba(0,255,65,.35),0 0 30px rgba(0,180,40,.2);
  animation:title-pulse 6s ease-in-out infinite;
}
.glitch::before,.glitch::after{
  content:attr(data-text);position:absolute;top:0;left:0;width:100%;opacity:0;
}
.glitch::before{color:#00ff41;animation:glitch-flicker 12s infinite}
.glitch::after{color:#006622;animation:glitch-flicker 12s infinite reverse}
@keyframes title-pulse{
  0%,100%{text-shadow:0 0 12px rgba(0,255,65,.3),0 0 28px rgba(0,180,40,.15)}
  50%{text-shadow:0 0 18px rgba(0,255,65,.45),0 0 40px rgba(0,180,40,.25)}
}
@keyframes glitch-flicker{
  0%,96%,100%{opacity:0;transform:none}
  97%{opacity:.25;transform:translate(-2px,0)}
  98%{opacity:0}
  99%{opacity:.15;transform:translate(2px,0)}
}

.ring-wrap{position:relative;margin-bottom:1rem}
.ring{
  position:absolute;border-radius:50%;border:1px solid;
  top:50%;left:50%;transform:translate(-50%,-50%);
  animation:spin linear infinite;
}
.ring:nth-child(1){width:108%;height:280%;border-color:rgba(0,255,65,.12);animation-duration:24s;opacity:.5}
.ring:nth-child(2){width:118%;height:300%;border-color:rgba(0,200,50,.08);animation-duration:36s;animation-direction:reverse;opacity:.35}
.ring:nth-child(3){display:none}
@keyframes spin{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}

.sub{
  margin-top:2rem;font-size:clamp(.75rem,2vw,1.1rem);letter-spacing:.45em;
  text-transform:uppercase;color:#3d8f4a;
  text-shadow:0 0 8px rgba(0,255,65,.15);
  transition:opacity .8s ease;
}
.click-hint{
  margin-top:1.5rem;font-size:.7rem;color:rgba(0,255,65,.22);
  letter-spacing:.25em;text-transform:uppercase;animation:breathe 4s ease-in-out infinite;
}
@keyframes breathe{0%,100%{opacity:.25}50%{opacity:.5}}

#cursor{
  position:fixed;width:8px;height:8px;border-radius:50%;
  background:#00ff41;pointer-events:none;z-index:999;
  transform:translate(-50%,-50%);
  box-shadow:0 0 6px rgba(0,255,65,.6),0 0 14px rgba(0,255,65,.25);
  transition:transform .08s ease;
}
</style>
</head>
<body>

<canvas id="matrix"></canvas>
<canvas id="particles"></canvas>

<div id="cursor"></div>

<div id="ui">
  <div class="ring-wrap">
    <div class="ring"></div><div class="ring"></div><div class="ring"></div>
    <h1 class="glitch" data-text="HELLO WORLD" id="title">HELLO WORLD</h1>
  </div>
  <p class="sub" id="sub">WELCOME TO THE MATRIX</p>
  <p class="click-hint">observe the stream · move to disturb</p>
</div>

<script>
const PI2 = Math.PI * 2;
const rand = (a,b) => Math.random()*(b-a)+a;
const pick = a => a[Math.floor(Math.random()*a.length)];

/* Matrix greens */
const GREEN_BRIGHT = '#ccffcc';
const GREEN_HEAD = '#00ff41';
const GREEN_MID = '#00aa33';
const GREEN_DIM = '#004d15';
const greens = [GREEN_HEAD, GREEN_MID, '#008f2a', GREEN_DIM];

/* ─── Matrix Rain (classic green, calm) ─── */
(function(){
  const cv = document.getElementById('matrix'), ctx = cv.getContext('2d');
  let W,H,cols,drops,speeds;
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789アイウエオカキクケコサシスセソタチツテト';

  function init(){
    W=cv.width=window.innerWidth; H=cv.height=window.innerHeight;
    cols=Math.floor(W/16);
    drops=Array(cols).fill(0).map(()=>rand(0,H/16));
    speeds=Array(cols).fill(0).map(()=>rand(.4,.9));
  }
  init(); window.addEventListener('resize',init);

  setInterval(()=>{
    ctx.fillStyle='rgba(2,10,4,.06)';
    ctx.fillRect(0,0,W,H);
    ctx.font='15px monospace';
    drops.forEach((y,i)=>{
      const ch=chars[Math.floor(Math.random()*chars.length)];
      const x=i*16;
      const py=y*16;

      /* trailing column */
      ctx.fillStyle=GREEN_DIM;
      ctx.shadowColor='transparent'; ctx.shadowBlur=0;
      ctx.globalAlpha=.35;
      ctx.fillText(ch,x,py);

      /* bright head */
      ctx.globalAlpha=rand(.7,.95);
      ctx.fillStyle=Math.random()>.92?GREEN_BRIGHT:GREEN_HEAD;
      ctx.shadowColor=GREEN_HEAD; ctx.shadowBlur=6;
      ctx.fillText(ch,x,py-16);

      ctx.globalAlpha=1;
      if(py>H && Math.random()>.985) drops[i]=0;
      else drops[i]+=speeds[i];
    });
  },70);
})();

/* ─── Soft green particles ─── */
(function(){
  const cv=document.getElementById('particles'), ctx=cv.getContext('2d');
  let W,H,mx=-9999,my=-9999;
  function init(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight}
  init(); window.addEventListener('resize',init);
  window.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});

  class P {
    constructor(){this.reset(true)}
    reset(init){
      this.x=rand(0,W); this.y=init?rand(0,H):H+5;
      this.r=rand(.4,1.6); this.vx=(Math.random()-.5)*.25;
      this.vy=-rand(.15,.5); this.bright=rand(.2,.6);
    }
    tick(){
      const dx=this.x-mx,dy=this.y-my,d=Math.sqrt(dx*dx+dy*dy);
      if(d<90){this.x+=dx/d*1.2;this.y+=dy/d*1.2}
      this.x+=this.vx; this.y+=this.vy;
      if(this.y<-5||this.x<-5||this.x>W+5) this.reset(false);
    }
    draw(){
      ctx.save(); ctx.globalAlpha=this.bright*.5;
      ctx.shadowColor=GREEN_HEAD; ctx.shadowBlur=4;
      ctx.fillStyle=GREEN_MID;
      ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,PI2); ctx.fill();
      ctx.restore();
    }
  }
  const ps=[]; for(let i=0;i<60;i++) ps.push(new P());

  const trail=[];
  window.addEventListener('mousemove',e=>{
    trail.push({x:e.clientX,y:e.clientY,r:rand(1,2),life:1});
    if(trail.length>40) trail.shift();
  });

  (function loop(){
    ctx.clearRect(0,0,W,H);
    ps.forEach(p=>{p.tick();p.draw()});
    trail.forEach((t,i)=>{
      t.life-=.025;
      if(t.life<=0){trail.splice(i,1);return}
      ctx.save(); ctx.globalAlpha=t.life*.35;
      ctx.fillStyle=GREEN_HEAD; ctx.shadowColor=GREEN_HEAD; ctx.shadowBlur=6;
      ctx.beginPath(); ctx.arc(t.x,t.y,t.r*t.life,0,PI2); ctx.fill();
      ctx.restore();
    });
    requestAnimationFrame(loop);
  })();
})();

/* Cursor */
const cur=document.getElementById('cursor');
window.addEventListener('mousemove',e=>{
  cur.style.left=e.clientX+'px';
  cur.style.top=e.clientY+'px';
});

/* Calm matrix phrases */
const phrases=[
  'WELCOME TO THE MATRIX',
  'THE MATRIX HAS YOU',
  'FOLLOW THE CODE',
  'THERE IS NO SPOON',
  'SYSTEM ONLINE',
  'STREAM STABLE'
];
let pi=0;
setInterval(()=>{
  pi=(pi+1)%phrases.length;
  const el=document.getElementById('sub');
  el.style.opacity=0;
  setTimeout(()=>{el.textContent=phrases[pi];el.style.opacity=1},500);
},5000);
</script>
</body>
</html>
